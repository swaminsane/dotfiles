# ============================================================
#  ~/.config/tmux/tmux.conf — custom config
#  Debian | dwm | st | nvim workflow
# ============================================================

# ── Prefix ──────────────────────────────────────────────────
# Keep Ctrl+b (default). No change needed.
unbind C-b
set -g prefix C-b
bind C-b send-prefix

# ── Shell ────────────────────────────────────────────────────
set -g default-shell /bin/bash
set -g default-command "bash --login"

# ── Force correct PATH (dwm launches tmux with bare env) ─────
set-environment -g PATH "/home/swaminsane/.local/bin:/home/swaminsane/.local/src/nvim-linux-x86_64/bin:/usr/local/bin:/usr/bin:/bin"

# ── General ─────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g history-limit 10000
set -g base-index 1              # windows start at 1 (not 0)
setw -g pane-base-index 1        # panes start at 1 too
set -g renumber-windows on       # auto-renumber after closing
set -sg escape-time 0            # no delay after Escape (important for nvim)
set -g bell-action none
set -g visual-bell off
set -g visual-activity off

# ── Mouse ────────────────────────────────────────────────────
set -g mouse on                  # scroll + click to select pane/window

# ── Reload config ───────────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# ── Splitting panes (intuitive keys) ────────────────────────
bind | split-window -h -c "#{pane_current_path}"   # vertical split
bind - split-window -v -c "#{pane_current_path}"   # horizontal split
unbind '"'
unbind %

# ── Pane navigation: Vim + Arrow keys ───────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind Left  select-pane -L
bind Down  select-pane -D
bind Up    select-pane -U
bind Right select-pane -R

# ── Pane resizing (hold prefix, tap arrow or vim key) ───────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Window navigation ────────────────────────────────────────
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-h previous-window
bind -n M-l next-window

# ── Copy mode (Vim-style) ────────────────────────────────────
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi y   send -X copy-pipe-and-cancel "xclip -sel clipboard -i"
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi H   send -X start-of-line
bind -T copy-mode-vi L   send -X end-of-line
# scroll with mouse wheel works automatically with mouse on

# ── Session: "hub" ───────────────────────────────────────────
# This session is created by the script ~/bin/hub
# Ctrl+t in your shell will open/attach it (add alias below)

# ── Status bar ───────────────────────────────────────────────
set -g status on
set -g status-interval 5
set -g status-position bottom

# Colors (minimal, dark)
set -g status-style                 "bg=#1a1a1a,fg=#888888"
set -g window-status-style          "bg=#1a1a1a,fg=#555555"
set -g window-status-current-style  "bg=#1a1a1a,fg=#d4d4d4,bold"
set -g pane-border-style            "fg=#333333"
set -g pane-active-border-style     "fg=#888888"
set -g message-style                "bg=#1a1a1a,fg=#d4d4d4"

# Left: session name
set -g status-left-length 30
set -g status-left "#[fg=#888888][#[fg=#d4d4d4]#S#[fg=#888888]] "

# Right: git branch + time
set -g status-right-length 60
set -g status-right "#[fg=#555555]#{?#{!=:#{git_branch},},#[fg=#888888] #{git_branch}  ,}#[fg=#555555]%d %b  #[fg=#888888]%H:%M"

# Window list (center)
set -g status-justify left
setw -g window-status-format         " #I:#W "
setw -g window-status-current-format " #I:#W "

# ── TPM Plugins ──────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'    # save/restore sessions
set -g @plugin 'tmux-plugins/tmux-continuum'    # auto-save every 15 min
set -g @plugin 'tmux-plugins/tmux-yank'         # better clipboard yank
set -g @plugin 'kristijanhusak/tmux-simple-git-status'  # git branch in status

# tmux-resurrect: also restore nvim sessions
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-capture-pane-contents 'off'

# tmux-continuum: auto-restore on tmux server start
set -g @continuum-restore 'off'
set -g @continuum-save-interval '15'

# Initialize TPM (keep this line at the very bottom)
run '~/.config/tmux/plugins/tpm/tpm'
